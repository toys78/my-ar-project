<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자동차 AR 시연</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }
        #playBtn {
            position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #007AFF; color: white; border: none;
            border-radius: 50px; font-size: 16px; font-weight: bold; z-index: 9999;
        }
    </style>
</head>
<body>
    <model-viewer 
        id="viewer" 
        src="./car.glb"      ios-src="./car.glb"  ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        scale="0.25 0.25 0.25"
        ar-placement="floor">

        <button slot="ar-button" style="position: absolute; top: 20px; right: 20px; padding: 12px; background: white; border-radius: 8px; border: 1px solid #ccc; z-index: 1001;">
            📱 여기서 AR 보기
        </button>

        <button id="playBtn" slot="ar-content">▶ 애니메이션 재생</button>
    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const playBtn = document.querySelector('#playBtn');
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) { viewer.pause(); isPlaying = false; return; }
            viewer.animationName = 'up'; 
            viewer.play();
            isPlaying = true;
        });

        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down';
                viewer.play();
            } else { isPlaying = false; }
        });
    </script>
</body>
</html>
