<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아이폰 AR 이벤트 연동</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        .play-button {
            position: fixed;
            bottom: 65px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 35px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            z-index: 9999; /* 최상단 레이어 보장 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="car-viewer"
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look" 
        camera-controls 
        scale="0.25 0.25 0.25"
        ar-placement="floor">

        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px; z-index: 100;">
            👋 여기서 AR 보기
        </button>

        <button id="play-btn" class="play-button" slot="ar-content">
            <span id="play-icon">▶</span> <span id="btn-text">애니메이션 재생</span>
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');
        const btnText = document.querySelector('#btn-text');
        const playIcon = document.querySelector('#play-icon');
        
        let isPlaying = false;

        // 아이폰 AR 모드에서의 클릭 이벤트 보정
        playBtn.addEventListener('click', (e) => {
            // AR 시스템 이벤트와 충돌 방지
            e.stopPropagation();
            e.preventDefault();

            if (isPlaying) {
                modelViewer.pause();
                isPlaying = false;
                updateButton("play");
                return;
            }

            // 'up' 애니메이션부터 시작
            modelViewer.animationName = 'up'; 
            modelViewer.currentTime = 0;
            modelViewer.play();
            isPlaying = true;
            updateButton("pause");
        });

        modelViewer.addEventListener('finished', () => {
            if (modelViewer.animationName === 'up') {
                modelViewer.animationName = 'down';
                modelViewer.play();
            } else {
                isPlaying = false;
                updateButton("replay");
            }
        });

        function updateButton(state) {
            if (state === "play") {
                playIcon.innerHTML = "▶";
                btnText.innerText = "애니메이션 재생";
            } else if (state === "pause") {
                playIcon.innerHTML = "||";
                btnText.innerText = "일시 정지";
            } else if (state === "replay") {
                playIcon.innerHTML = "🔄";
                btnText.innerText = "다시 재생";
            }
        }
    </script>
</body>
</html>        /* 핵심: 배경 이미지는 절대 넣지 말고 아래 조명 설정만 유지하세요 */

        </button>

        </button>

    <script>

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) {
                modelViewer.pause();

            isPlaying = true;
            playBtn.innerText = "|| 일시 정지";

            if (modelViewer.animationName === 'up') {

        });
    </script>
</body>
</html>
