<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 AR 시연 - 클린 뷰</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* 화면 전체를 깔끔하게 유지 */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        model-viewer { 
            width: 100%; 
            height: 100vh; 
            --poster-color: transparent; /* 로딩 중 배경도 투명하게 */
        }

        #playBtn {
            position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #007AFF; color: white; border: none;
            border-radius: 50px; font-size: 16px; font-weight: bold; z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="car-viewer"
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        shadow-intensity="1"
        scale="0.25 0.25 0.25"
        ar-placement="floor"
        /* 핵심: 배경 이미지는 절대 넣지 말고 아래 조명 설정만 유지하세요 */
        environment-image="neutral" 
        exposure="1"
        alt="A 3D model of a car">

        <button slot="ar-button" style="position: absolute; top: 20px; right: 20px; padding: 12px; background: white; border-radius: 8px; border: 1px solid #ccc; z-index: 100;">
            📱 여기서 AR 보기
        </button>

        <button id="play-btn" class="playBtn" slot="ar-content">
            ▶ 애니메이션 재생
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) {
                modelViewer.pause();
                isPlaying = false;
                playBtn.innerText = "▶ 애니메이션 재생";
                return;
            }
            modelViewer.animationName = 'up'; 
            modelViewer.currentTime = 0;
            modelViewer.play();
            isPlaying = true;
            playBtn.innerText = "|| 일시 정지";
        });

        modelViewer.addEventListener('finished', () => {
            if (modelViewer.animationName === 'up') {
                modelViewer.animationName = 'down';
                modelViewer.play();
            } else {
                isPlaying = false;
                playBtn.innerText = "🔄 다시 재생";
            }
        });
    </script>
</body>
</html>
