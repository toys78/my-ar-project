<!DOCTYPE html>
<html>
<head>
    <title>자동차 AR 시연 - 시퀀스 제어</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        /* 플레이 버튼 스타일 */
        #playBtn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="car.glb" 
        ar 
        camera-controls 
        shadow-intensity="1"
        scale="0.25 0.25 0.25"> <button id="playBtn">
            <span id="iconPlay">▶ 재생</span>
            <span id="iconPause" class="hidden">|| 일시정지</span>
            <span id="iconReplay" class="hidden">🔄 다시보기</span>
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const playBtn = document.querySelector('#playBtn');
        let isPlaying = false;

        // 1. 버튼 클릭 시 제어 로직
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                viewer.pause();
                isPlaying = false;
                setIcon('play');
                return;
            }

            // 'up' 애니메이션부터 시작 (이름이 정확해야 합니다)
            viewer.animationName = 'up'; 
            viewer.play();
            isPlaying = true;
            setIcon('pause');
        });

        // 2. 애니메이션 종료 감지 (up -> down 연결)
        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down'; // up 끝나면 down 실행
                viewer.play();
            } else {
                // down까지 모두 완료된 상태
                isPlaying = false;
                setIcon('replay');
            }
        });

        // 3. 아이콘 교체 함수
        function setIcon(state) {
            document.querySelector('#iconPlay').classList.toggle('hidden', state !== 'play');
            document.querySelector('#iconPause').classList.toggle('hidden', state !== 'pause');
            document.querySelector('#iconReplay').classList.toggle('hidden', state !== 'replay');
        }
    </script>
</body>
</html>
