<!DOCTYPE html>
<html>
<head>
    <title>내 자동차 AR 시연</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        /* 플레이 버튼 디자인 */
        .play-button {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%); /* 수평 중앙 정렬 */
    z-index: 999;
    display: block;              /* !important 제거 */
}

        .play-button:active {
            background-color: #0056b3;
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>
<model-viewer src="car.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" autoplay>
    <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
    </div>
    <button slot="ar-button" id="ar-button">
        View in your space
    </button>
    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>

    

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');

        playBtn.addEventListener('click', () => {
            // 처음부터 재생하기 위해 시간을 0으로 초기화
            modelViewer.currentTime = 0;
            modelViewer.play();
            
            // 재생 중임을 알리기 위해 버튼 텍스트 변경 (선택 사항)
            playBtn.innerHTML = "<span>🔄</span> 다시 재생";
        });

        // 애니메이션이 끝나면 버튼 상태를 원래대로 (선택 사항)
        modelViewer.addEventListener('finished', () => {
            playBtn.innerHTML = "<span>▶</span> 애니메이션 재생";
        });
    </script>

</body>
</html>
