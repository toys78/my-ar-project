<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 AR 시연 - 마스터 클린 뷰</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #ffffff; }
        /* 로딩 중 포스터 색상을 투명하게 하여 배경 이미지가 비치는 것을 방지 */
        model-viewer { 
            width: 100%; 
            height: 100vh; 
            --poster-color: transparent; 
        }

        #playBtn {
            position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #007AFF; color: white; border: none;
            border-radius: 50px; font-size: 17px; font-weight: bold; z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px;
        }

        #ar-button {
            position: absolute; top: 20px; right: 20px; padding: 12px 20px;
            background: white; border: 1px solid #ccc; border-radius: 8px; z-index: 1001;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        scale="0.25 0.25 0.25"
        ar-placement="floor"
        /* [중요] 배경 이미지를 절대 넣지 말고 null 처리하세요 */
        skybox-image="" 
        environment-image="neutral" 
        exposure="1"
        autoplay
        animation-name="up">

        <button slot="ar-button" id="ar-button">📱 여기서 AR 보기</button>

        <button id="playBtn" slot="ar-content">
            <span id="iconPause">|| 분해 애니메이션 일시정지</span>
        </button>

    </model-viewer>

    <script>
        // ... 기존 재생 로직 동일 (버튼 텍스트만 '분해 애니메이션'으로 변경) ...
        const viewer = document.querySelector('#viewer');
        const playBtn = document.querySelector('#playBtn');
        let isPlaying = true; 

        viewer.addEventListener('load', () => {
            viewer.animationName = 'up';
            viewer.play();
        });

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) {
                viewer.pause();
                isPlaying = false;
                playBtn.innerText = "▶ 분해 애니메이션 실행";
            } else {
                if (viewer.animationName === 'down' && !isPlaying) {
                    viewer.animationName = 'up';
                    viewer.currentTime = 0;
                }
                viewer.play();
                isPlaying = true;
                playBtn.innerText = "|| 분해 애니메이션 일시정지";
            }
        });

        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down';
                viewer.play();
                playBtn.innerText = "|| 분해 애니메이션 일시정지";
            } else {
                isPlaying = false;
                playBtn.innerText = "🔄 다시 분해하기";
            }
        });
    </script>
</body>
</html>
