<!DOCTYPE html>
<html>
<head>
    <title>내 자동차 AR 시연</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        /* 플레이 버튼 디자인 */
        .play-button {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background-color: #007AFF; /* 모던한 블루 */
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-button:active {
            background-color: #0056b3;
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="car-viewer"
        src="car.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        animation-name="*"> <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            👋 여기서 AR 보기
        </button>

        <button id="play-btn" class="play-button">
            <span>▶</span> 애니메이션 재생
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');

        playBtn.addEventListener('click', () => {
            // 처음부터 재생하기 위해 시간을 0으로 초기화
            modelViewer.currentTime = 0;
            modelViewer.play();
            
            // 재생 중임을 알리기 위해 버튼 텍스트 변경 (선택 사항)
            playBtn.innerHTML = "<span>🔄</span> 다시 재생";
        });

        // 애니메이션이 끝나면 버튼 상태를 원래대로 (선택 사항)
        modelViewer.addEventListener('finished', () => {
            playBtn.innerHTML = "<span>▶</span> 애니메이션 재생";
        });
    </script>

</body>
</html>
