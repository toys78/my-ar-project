<script>
    const viewer = document.querySelector('#car-viewer');
    const playBtn = document.querySelector('#play-btn');
    let isPlaying = false;

    playBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (isPlaying) {
            viewer.pause();
            isPlaying = false;
            updateButton("play");
            return;
        }

        // 'up' 액션을 명확히 지칭하여 시작
        viewer.animationName = 'up'; 
        viewer.currentTime = 0; 
        viewer.play();
        isPlaying = true;
        updateButton("pause");
    });

    // up이 끝난 직후 down으로 전환하는 로직
    viewer.addEventListener('finished', () => {
        if (viewer.animationName === 'up') {
            viewer.animationName = 'down';
            viewer.currentTime = 0; // 시작점 초기화
            viewer.play();
        } else {
            isPlaying = false;
            updateButton("replay");
        }
    });

    function updateButton(state) {
        const btnText = document.querySelector('#btn-text');
        const playIcon = document.querySelector('#play-icon');
        if (state === "play") { playIcon.innerHTML = "▶"; btnText.innerText = "애니메이션 재생"; }
        else if (state === "pause") { playIcon.innerHTML = "||"; btnText.innerText = "일시 정지"; }
        else if (state === "replay") { playIcon.innerHTML = "🔄"; btnText.innerText = "다시 재생"; }
    }
</script>
