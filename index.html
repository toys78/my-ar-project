<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 AR 시연</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; background-color: #f0f0f0; }

        /* [요청] 시작 버튼: 버튼 높이 절반만큼 위로 이동 */
        #playBtn {
            position: fixed;
            bottom: 65px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 35px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* AR 버튼 디자인 */
        #ar-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 1001;
            display: block !important;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        scale="0.25 0.25 0.25"
        ar-placement="floor">

        <button slot="ar-button" id="ar-button">📱 여기서 AR 보기</button>

        <button id="playBtn" slot="ar-content">
            <span id="iconPlay">▶ 재생 시작</span>
            <span id="iconPause" class="hidden">|| 일시정지</span>
            <span id="iconReplay" class="hidden">🔄 다시보기</span>
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const playBtn = document.querySelector('#playBtn');
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isPlaying) {
                viewer.pause();
                isPlaying = false;
                setIcon('play');
                return;
            }
            viewer.animationName = 'up'; 
            viewer.play();
            isPlaying = true;
            setIcon('pause');
        });

        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down';
                viewer.play();
            } else {
                isPlaying = false;
                setIcon('replay');
            }
        });

        function setIcon(state) {
            document.querySelector('#iconPlay').classList.toggle('hidden', state !== 'play');
            document.querySelector('#iconPause').classList.toggle('hidden', state !== 'pause');
            document.querySelector('#iconReplay').classList.toggle('hidden', state !== 'replay');
        }
    </script>
</body>

            👋 여기서 AR 보기
        </button>

        <button id="play-btn" class="play-button" slot="ar-content">
            <span id="play-icon">▶</span> <span id="btn-text">애니메이션 재생</span>
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');
        const btnText = document.querySelector('#btn-text');
        const playIcon = document.querySelector('#play-icon');
        
        let isPlaying = false;

        // 아이폰 AR 모드에서의 클릭 이벤트 보정
        playBtn.addEventListener('click', (e) => {
            // AR 시스템 이벤트와 충돌 방지
            e.stopPropagation();
            e.preventDefault();

            if (isPlaying) {
                modelViewer.pause();
                isPlaying = false;
                updateButton("play");
                return;
            }

            // 'up' 애니메이션부터 시작
            modelViewer.animationName = 'up'; 
            modelViewer.currentTime = 0;
            modelViewer.play();
            isPlaying = true;
            updateButton("pause");
        });

        modelViewer.addEventListener('finished', () => {
            if (modelViewer.animationName === 'up') {
                modelViewer.animationName = 'down';
                modelViewer.play();
            } else {
                isPlaying = false;
                updateButton("replay");
            }
        });

        function updateButton(state) {
            if (state === "play") {
                playIcon.innerHTML = "▶";
                btnText.innerText = "애니메이션 재생";
            } else if (state === "pause") {
                playIcon.innerHTML = "||";
                btnText.innerText = "일시 정지";
            } else if (state === "replay") {
                playIcon.innerHTML = "🔄";
                btnText.innerText = "다시 재생";
            }
        }
    </script>
</body>
