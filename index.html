<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>자동차 AR 시연 - 복구 버전</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        /* 재생 버튼: 요청하신 대로 기존보다 절반 정도 위로 이동 */
        .play-button {
            position: fixed;
            bottom: 65px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 35px;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-button:active {
            background-color: #0056b3;
            transform: translateX(-50%) scale(0.95);
        }

        /* AR 버튼: 우측 상단 고정 */
        #ar-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 1001;
            display: block !important;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer 
        id="car-viewer"
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look webxr" 
        camera-controls 
        shadow-intensity="1"
        scale="0.25 0.25 0.25"
        ar-placement="floor">

        <button slot="ar-button" id="ar-button">
            👋 여기서 AR 보기
        </button>

        <button id="play-btn" class="play-button" slot="ar-content">
            <span id="play-icon">▶</span> <span id="btn-text">애니메이션 재생</span>
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#car-viewer');
        const playBtn = document.querySelector('#play-btn');
        const btnText = document.querySelector('#btn-text');
        const playIcon = document.querySelector('#play-icon');
        
        let isPlaying = false;

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();

            if (isPlaying) {
                modelViewer.pause();
                isPlaying = false;
                updateButton("play");
                return;
            }

            // 'up' 애니메이션부터 시작
            modelViewer.animationName = 'up'; 
            modelViewer.currentTime = 0;
            modelViewer.play();
            isPlaying = true;
            updateButton("pause");
        });

        // up -> down 순차 재생 로직
        modelViewer.addEventListener('finished', () => {
            if (modelViewer.animationName === 'up') {
                modelViewer.animationName = 'down';
                modelViewer.play();
            } else {
                isPlaying = false;
                updateButton("replay");
            }
        });

        function updateButton(state) {
            if (state === "play") {
                playIcon.innerHTML = "▶";
                btnText.innerText = "애니메이션 재생";
            } else if (state === "pause") {
                playIcon.innerHTML = "||";
                btnText.innerText = "일시 정지";
            } else if (state === "replay") {
                playIcon.innerHTML = "🔄";
                btnText.innerText = "다시 재생";
            }
        }
    </script>
</body>
</html>
