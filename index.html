<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic AR View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; }
        model-viewer { width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        camera-controls 
        autoplay
        animation-name="up"
        shadow-intensity="1"
        environment-image="neutral"
        /* 배경 이미지를 강제로 비움으로써 나무 숲 제거 */
        skybox-image="">

        <button slot="ar-button" style="position: absolute; top: 20px; right: 20px; padding: 10px;">
            AR 보기
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector('model-viewer');
        
        // up 애니메이션 종료 후 down 자동 실행 (핵심 로직만 유지)
        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down';
                viewer.play();
            }
        });
    </script>
</body>
</html>
