<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 자동차 AR 시연</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 95vh; background-color: #f0f0f0; }

        /* 플레이 버튼 디자인 */
        #playBtn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            background: #007AFF; /* 모던 블루 */
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* 아이폰에서 AR 버튼이 절대 숨겨지지 않도록 강제 노출 */
        #ar-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            display: block !important; /* 강제 노출 */
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer" 
        src="car.glb" 
        ios-src="car.glb" 
        ar 
        ar-modes="quick-look webxr scene-viewer" 
        camera-controls 
        shadow-intensity="1"
        scale="0.25 0.25 0.25">

        <button slot="ar-button" id="ar-button">
            📱 여기서 AR 보기
        </button>

        <button id="playBtn">
            <span id="iconPlay">▶ 재생 시작</span>
            <span id="iconPause" class="hidden">|| 일시정지</span>
            <span id="iconReplay" class="hidden">🔄 다시보기</span>
        </button>

    </model-viewer>

    <script>
        const viewer = document.querySelector('#viewer');
        const playBtn = document.querySelector('#playBtn');
        let isPlaying = false;

        // 1. 버튼 클릭 제어 로직
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                viewer.pause();
                isPlaying = false;
                setIcon('play');
                return;
            }

            // 'up' 애니메이션부터 시작
            viewer.animationName = 'up'; 
            viewer.play();
            isPlaying = true;
            setIcon('pause');
        });

        // 2. 애니메이션 종료 감지 (up -> down 순차 재생)
        viewer.addEventListener('finished', () => {
            if (viewer.animationName === 'up') {
                viewer.animationName = 'down'; // up이 끝나면 down 실행
                viewer.play();
            } else {
                // down까지 완료된 상태
                isPlaying = false;
                setIcon('replay');
            }
        });

        // 3. 아이콘 상태 변경 함수
        function setIcon(state) {
            document.querySelector('#iconPlay').classList.toggle('hidden', state !== 'play');
            document.querySelector('#iconPause').classList.toggle('hidden', state !== 'pause');
            document.querySelector('#iconReplay').classList.toggle('hidden', state !== 'replay');
        }
    </script>
</body>
</html>
